<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bei Xujiaqiao GeoJSON Viewer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" crossorigin="">
<style>
:root {
  --sidebar-w: 360px;
  --bg: #f5f5f0;
  --panel: #fff;
  --border: #d8d4c8;
  --text: #2c2c2c;
  --accent: #5c4a32;
  --muted: #6b6560;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; font-family: "Segoe UI", system-ui, sans-serif; color: var(--text); background: var(--bg); }
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar {
  width: var(--sidebar-w); min-width: 280px; max-width: 90vw;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 1000;
}
#sidebar.collapsed { display: none; }
#sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); background: #faf8f4; }
#sidebar-header h1 { margin: 0 0 8px; font-size: 1.05rem; font-weight: 600; color: var(--accent); }
.global-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.abandonment-row {
  display: flex; align-items: flex-start; gap: 6px; margin-bottom: 8px;
  font-size: 0.75rem; line-height: 1.35; color: var(--muted);
}
.abandonment-row input { margin-top: 2px; flex-shrink: 0; }
button {
  border: 1px solid var(--border); background: #fff; color: var(--text);
  padding: 5px 10px; border-radius: 4px; font-size: 0.78rem; cursor: pointer;
}
button:hover { background: #f0ebe3; }
.tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.tab-btn { flex: 1; padding: 8px 6px; font-size: 0.75rem; }
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
#layer-panels { flex: 1; overflow-y: auto; padding: 8px 10px 16px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.group { margin-bottom: 6px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.group-header {
  display: flex; align-items: center; gap: 6px; padding: 7px 8px;
  background: #f7f4ee; cursor: pointer; user-select: none;
}
.group-header input[type=checkbox] { flex-shrink: 0; }
.group-title { flex: 1; font-size: 0.82rem; font-weight: 600; }
.group-title:hover { color: var(--accent); text-decoration: underline; }
.group.open .group-toggle { transform: rotate(0deg); }
.group:not(.open) .group-toggle { transform: rotate(-90deg); }
.group-body { display: none; padding: 4px 8px 8px 22px; }
.group.open .group-body { display: block; }
.layer-row {
  display: flex; align-items: center; gap: 6px; padding: 3px 0;
  font-size: 0.78rem; line-height: 1.3;
}
.swatch { width: 12px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,.15); flex-shrink: 0; }
.swatch.dashed { background: transparent !important; border-style: dashed; }
.swatch.dotted { background: transparent !important; border-style: dotted; }
#map-wrap { flex: 1; position: relative; background: #ffffff; }
#map-toolbar {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  display: flex; gap: 4px;
  background: rgba(255,255,255,.95); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
#map-sidebar-tools {
  position: absolute; top: 10px; left: 10px; z-index: 1000;
  display: flex; flex-direction: column; gap: 8px;
}
.tool-group {
  display: flex; flex-direction: column; gap: 2px;
  background: rgba(255,255,255,.95); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
.tool-group-title { display: none; }
.icon-btn {
  position: relative;
  width: 34px; height: 34px;
  border: none; background: transparent; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  padding: 0; cursor: pointer; color: var(--text);
}
.icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.icon-btn:hover { background: #f0ebe3; }
.icon-btn.active { background: var(--accent); color: #fff; }
.icon-btn .tip {
  position: absolute; left: calc(100% + 8px); top: 50%;
  transform: translateY(-50%);
  background: #2c2c2c; color: #fff; padding: 5px 8px; border-radius: 4px;
  font-size: 0.72rem; white-space: nowrap; pointer-events: none;
  opacity: 0; visibility: hidden; transition: opacity 0.12s, visibility 0.12s;
  z-index: 1002; box-shadow: 0 2px 6px rgba(0,0,0,.2);
}
.icon-btn:hover .tip, .icon-btn:focus-visible .tip { opacity: 1; visibility: visible; }
#map-toolbar .icon-btn .tip {
  left: 50%; top: calc(100% + 6px); transform: translateX(-50%);
}
#map { width: 100%; height: 100%; background: #ffffff; }
.leaflet-container { background: #ffffff !important; }
#scale-bar-wrap {
  position: absolute; z-index: 1000; cursor: move; user-select: none;
  background: transparent; border: none; border-radius: 0;
  padding: 6px 8px 4px; box-shadow: none;
  display: none;
}
#scale-bar-wrap.visible { display: block; }
#export-legend-wrap {
  position: absolute; z-index: 1000; cursor: move; user-select: none;
  background: transparent; border: none; padding: 4px;
  display: none; min-width: 120px; transform-origin: top left;
}
#export-legend-wrap.visible { display: block; }
#export-legend-wrap.dragging { opacity: 0.85; }
.overlay-resize-handle {
  position: absolute; right: -2px; bottom: -2px;
  width: 14px; height: 14px; cursor: nwse-resize;
  border-right: 2px solid #666; border-bottom: 2px solid #666;
  opacity: 0.55;
}
.overlay-resize-handle:hover { opacity: 1; }
.export-legend-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.7rem; line-height: 1.3; margin-bottom: 3px; color: #2c2c2c;
}
.export-legend-item .swatch { width: 10px; height: 10px; }
#scale-bar-track {
  position: relative; height: 8px; border-bottom: 2px solid #333; margin-top: 14px;
}
.scale-tick {
  position: absolute; bottom: 0; width: 1px; height: 6px; background: #333;
}
.scale-tick-label {
  position: absolute; bottom: 10px; transform: translateX(-50%);
  font-size: 0.65rem; color: #333; white-space: nowrap;
}
#legend-config {
  position: absolute; top: 10px; left: 56px; z-index: 1001;
  background: rgba(255,255,255,.97); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px; min-width: 200px; max-height: 50vh;
  overflow-y: auto; box-shadow: 0 2px 10px rgba(0,0,0,.15); display: none;
}
#legend-config.open { display: block; }
#legend-config h3 { margin: 0 0 8px; font-size: 0.82rem; }
#legend-config label { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 4px; }
#legend {
  position: absolute; bottom: 24px; right: 10px; z-index: 1000;
  background: rgba(255,255,255,.95); border: 1px solid var(--border);
  border-radius: 6px; max-height: 45vh; overflow: hidden; min-width: 180px;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
}
#legend.dragging { opacity: 0.85; }
#sidebar-toggle {
  position: absolute; top: 10px; left: 10px; z-index: 1000; display: none;
}
#legend-drag-handle { flex: 1; cursor: move; }
#legend-header {
  padding: 8px 10px; font-size: 0.8rem; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
  border-bottom: 1px solid var(--border);
}
#legend-chevron { cursor: pointer; padding: 0 2px; flex-shrink: 0; }
#legend-body { padding: 8px 10px; overflow-y: auto; max-height: 38vh; }
#legend.collapsed #legend-body { display: none; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; margin-bottom: 4px; }
#status { padding: 6px 14px; font-size: 0.72rem; color: var(--muted); border-top: 1px solid var(--border); }
@media (max-width: 900px) {
  #sidebar-toggle { display: block; }
  #map-sidebar-tools { top: 48px; }
  #sidebar { position: absolute; left: 0; top: 0; bottom: 0; box-shadow: 2px 0 12px rgba(0,0,0,.15); }
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>Bei Xujiaqiao Viewer</h1>
      <div class="global-actions">
        <button id="show-all-global" type="button">Show All Layers</button>
        <button id="hide-all-global" type="button">Hide All Layers</button>
        <button id="collapse-all" type="button">Collapse All</button>
      </div>
      <label class="abandonment-row">
        <input id="abandonment-mode" type="checkbox">
        <span>Grey out pre–Early WZ layers when Early WZ+ layers are visible (abandonment)</span>
      </label>
      <div class="tabs">
        <button class="tab-btn active" data-tab="period" type="button">By Period</button>
        <button class="tab-btn" data-tab="compound" type="button">By Compound/Trench</button>
      </div>
    </div>
    <div id="layer-panels">
      <div id="panel-compound" class="tab-panel"></div>
      <div id="panel-period" class="tab-panel active"></div>
    </div>
    <div id="status">Loading…</div>
  </aside>
  <div id="map-wrap">
    <button id="sidebar-toggle" type="button">☰ Layers</button>
    <div id="map-sidebar-tools">
      <div class="tool-group">
        <button class="icon-btn" id="tool-zoom-in" type="button" aria-label="Zoom in">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <span class="tip">Zoom in</span>
        </button>
        <button class="icon-btn" id="tool-zoom-out" type="button" aria-label="Zoom out">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          <span class="tip">Zoom out</span>
        </button>
      </div>
      <div class="tool-group">
        <button class="icon-btn" id="tool-draw-line" type="button" aria-label="Draw line">
          <svg viewBox="0 0 24 24"><line x1="4" y1="20" x2="20" y2="4"/></svg>
          <span class="tip">Draw line</span>
        </button>
        <button class="icon-btn" id="tool-draw-polygon" type="button" aria-label="Draw polygon">
          <svg viewBox="0 0 24 24"><polygon points="5,19 10,5 19,8 16,19" fill="currentColor" stroke="currentColor" stroke-width="1.5"/></svg>
          <span class="tip">Draw polygon</span>
        </button>
        <button class="icon-btn" id="tool-edit-sketch" type="button" aria-label="Edit layer">
          <svg viewBox="0 0 24 24"><path d="M4 20h4l10-10-4-4L4 16v4z"/><line x1="13" y1="7" x2="17" y2="11"/></svg>
          <span class="tip">Edit layer</span>
        </button>
        <button class="icon-btn" id="tool-delete-sketch" type="button" aria-label="Delete layer">
          <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
          <span class="tip">Delete layer</span>
        </button>
      </div>
      <div class="tool-group">
        <button class="icon-btn" id="tool-screenshot-area" type="button" aria-label="Draw screenshot area">
          <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1" stroke-dasharray="3 2"/></svg>
          <span class="tip">Draw screenshot area</span>
        </button>
        <button class="icon-btn" id="tool-scale-bar" type="button" aria-label="Place scale bar">
          <svg viewBox="0 0 24 24"><line x1="4" y1="16" x2="20" y2="16"/><line x1="4" y1="13" x2="4" y2="19"/><line x1="10" y1="14" x2="10" y2="18"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="20" y1="13" x2="20" y2="19"/></svg>
          <span class="tip">Place scale bar</span>
        </button>
        <button class="icon-btn" id="tool-legend-config" type="button" aria-label="Legend">
          <svg viewBox="0 0 24 24"><rect x="4" y="6" width="6" height="6" fill="currentColor" stroke="none"/><line x1="13" y1="8" x2="20" y2="8"/><rect x="4" y="14" width="6" height="6" fill="currentColor" stroke="none"/><line x1="13" y1="16" x2="20" y2="16"/></svg>
          <span class="tip">Export legend</span>
        </button>
        <button class="icon-btn" id="tool-download" type="button" aria-label="Download">
          <svg viewBox="0 0 24 24"><path d="M12 4v10"/><polyline points="8,10 12,14 16,10"/><rect x="5" y="18" width="14" height="2" fill="currentColor" stroke="none"/></svg>
          <span class="tip">Download</span>
        </button>
      </div>
    </div>
    <div id="legend-config">
      <h3>Export Legend Items</h3>
      <div id="legend-config-items"></div>
      <p style="font-size:0.68rem;color:var(--muted);margin:8px 0 0">Draw a screenshot area first. Select legend types, then drag within the screenshot frame to reposition. Drag the corner handle to resize.</p>
    </div>
    <div id="scale-bar-wrap">
      <div id="scale-bar-track"></div>
      <div class="overlay-resize-handle" title="Drag to resize scale bar"></div>
    </div>
    <div id="export-legend-wrap">
      <div id="export-legend-body"></div>
      <div class="overlay-resize-handle" title="Drag to resize legend"></div>
    </div>
    <div id="map-toolbar">
      <button class="icon-btn" id="fit-all" type="button" aria-label="Fit all selected layers">
        <svg viewBox="0 0 24 24"><polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
        <span class="tip">Fit all selected layers</span>
      </button>
      <button class="icon-btn" id="toggle-basemap" type="button" aria-label="Blank background" data-tip-blank="Blank background" data-tip-osm="OSM basemap">
        <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1" fill="currentColor" stroke="none" opacity="0.15"/><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
        <span class="tip" id="toggle-basemap-tip">Blank background</span>
      </button>
      <button class="icon-btn" id="clear-sketches" type="button" aria-label="Clear sketches">
        <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
        <span class="tip">Clear sketches</span>
      </button>
    </div>
    <div id="map"></div>
    <div id="legend">
      <div id="legend-header"><span id="legend-drag-handle">Legend (Feature Type)</span><span id="legend-chevron">▼</span></div>
      <div id="legend-body"></div>
    </div>
  </div>
</div>

function colorLuminance(hex) {
  const h = (hex || "#000000").replace("#", "");
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return r * 0.299 + g * 0.587 + b * 0.114;
}

function romanToInt(s) {
  const m = s.match(/Compound ([IVXLC]+)/);

function trenchSortKey(t) {
  const n = parseInt(t.replace(/\D/g, ""), 10);

  const base = name.replace(/\.geojson$/i, "");
  for (const p of [...PERIOD_ORDER].sort((a,b)=>b.length-a.length)) {
    const marker = "_" + p + "_";
    if (base.includes(marker)) return base.split(marker)[1];
    if (base.endsWith("_" + p)) return "";
  }
  return base;
}

function layerLabelTab1(file) {
  if (file.isBase) return "(Base outline)";
  const pl = file.period ? (PERIOD_LABELS[file.period] || file.period) : "—";
  const suffix = featureSuffix(file.name);
  const tl = TYPE_LABELS[file.featureType] || suffix || file.featureType;
  if (file.featureType === "foundation" && /F\d+/.test(suffix)) return pl + " — " + suffix;
  return pl + " — " + (suffix || tl);
}

function layerLabelTab2(entry, file) {
  const src = groupLabel(entry);
  if (file.isBase) return src + " — Base outline";
  if (file.isInterpretation) return src + " — Interpretation";
  const suffix = featureSuffix(file.name);
  if (file.featureType === "foundation" && /F\d+/.test(suffix)) return src + " — " + suffix;
  return src + " — " + (suffix || TYPE_LABELS[file.featureType] || file.featureType);
}

function buildLayers() {
  const layers = [];
  for (const entry of FILE_MANIFEST) {
    for (const file of entry.files) {
      if (isOmittedFile(file)) continue;
      layers.push({
        id: layerId(entry, file),
        dir: entry.dir,
        name: file.name,
        entry,
        file,
        groupKeyTab1: groupLabel(entry),
        period: file.period,
        featureType: file.featureType,
        isBase: file.isBase,
        isInterpretation: file.isInterpretation,
        labelTab1: layerLabelTab1(file),
        labelTab2: layerLabelTab2(entry, file)
      });
    }
  }
  return layers;
}

function sortGroupsTab1(entries) {
  const compounds = entries.filter(e => e.compound).sort((a,b) => romanToInt(a.compound) - romanToInt(b.compound));
  const trenches = entries.filter(e => !e.compound).sort((a,b) => trenchSortKey(a.trenches[0]) - trenchSortKey(b.trenches[0]));
  return [...compounds, ...trenches];
}

function periodIndex(p) {
  const i = PERIOD_ORDER.indexOf(p);
  return i >= 0 ? i : 999;
}

function sortLayersInGroup(layers) {
  return [...layers].sort((a,b) => {
    if (a.isBase !== b.isBase) return a.isBase ? -1 : 1;
    const pi = periodIndex(a.period) - periodIndex(b.period);
    if (pi !== 0) return pi;
    return (a.featureType || "").localeCompare(b.featureType || "");
  });
}

function sortLayersTab2(layers, groupOrder) {
  const orderMap = new Map(groupOrder.map((g,i) => [g,i]));
  return [...layers].sort((a,b) => {
    const gi = (orderMap.get(a.groupKeyTab1) ?? 999) - (orderMap.get(b.groupKeyTab1) ?? 999);
    if (gi !== 0) return gi;
    return (a.featureType || "").localeCompare(b.featureType || "");
  });
}

function transformCoords(coords) {
  if (typeof coords[0] === "number") {
    const [lng, lat] = proj4("EPSG:3857", "EPSG:4326", coords);
    return [lng, lat];
  }
  return coords.map(c => transformCoords(c));
}

function reprojectGeoJSON(geojson) {
  const clone = JSON.parse(JSON.stringify(geojson));
  for (const f of clone.features || []) {
    if (f.geometry && f.geometry.coordinates) {
      f.geometry.coordinates = transformCoords(f.geometry.coordinates);
    }
  }
  delete clone.crs;
  return clone;
}

function styleForType(featureType, abandoned) {
  if (abandoned) {
    return { color: "#999999", weight: 2, fillColor: "#bbbbbb", fillOpacity: 0.2 };
  }
  const color = TYPE_COLORS[featureType] || "#7f7f7f";
  if (featureType === "base") return { color: "#999999", weight: 2, dashArray: "6 4", fillOpacity: 0 };
  return { color, weight: 2, fillColor: color, fillOpacity: 0.4 };
}

function isAbandonmentPeriod(period) {
  return period && periodIndex(period) >= ABANDONMENT_PERIOD_IDX;
}

function shouldAbandonLayer(meta) {
  if (!abandonmentMode || meta.isBase || !meta.period) return false;
  const hasEwzPlus = Object.keys(layerState).some(id => layerState[id] && isAbandonmentPeriod(LAYER_BY_ID[id].period));
  return hasEwzPlus && periodIndex(meta.period) < ABANDONMENT_PERIOD_IDX;
}

function refreshAbandonmentStyles() {
  for (const id of Object.keys(leafletLayers)) {
    if (!layerState[id]) continue;
    const meta = LAYER_BY_ID[id];
    const lg = leafletLayers[id];
    const abandoned = shouldAbandonLayer(meta);
    lg.eachLayer(featureLayer => featureLayer.setStyle(styleForType(meta.featureType, abandoned)));
  }
}

const ALL_LAYERS = buildLayers();

const layerState = Object.fromEntries(ALL_LAYERS.map(l => [l.id, !l.isBase]));
const geoCache = {};
const leafletLayers = {};
const loading = new Set();
let map, osmLayer, blankLayer, activeBasemap = "osm";
let loadedBounds = null;
let abandonmentMode = false;
let drawnItems, exportItems, activeDrawHandler = null, editToolbar = null;
let screenshotLayer = null, scaleBarVisible = false, drawingScreenshotArea = false;
let scaleBarWidthPx = 100, exportLegendUserScale = 1;
let scaleBarRelPos = null;
let exportLegendRelPos = null;
const legendIncluded = new Set();
const exportLegendIncluded = new Set();
const EXPORT_MIN_WIDTH_PX = 1000;
const EXPORT_MIN_HEIGHT_PX = 1000;
const EXPORT_SCALE = 4;

const DEFAULT_VIEW_SW = [36.1060077, 114.3083653];
const DEFAULT_VIEW_NE = [36.1075510, 114.3114498];

function swatchClass(ft) {

  return "swatch";

function renderGroup(container, groupId, title, layers, tabName) {
  const group = document.createElement("div");
  group.className = "group";
  group.dataset.groupId = groupId;
  group.dataset.tab = tabName;

  const header = document.createElement("div");
  header.className = "group-header";

  const toggle = document.createElement("span");
  toggle.className = "group-toggle";
  toggle.textContent = "▼";

  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.dataset.groupCheckbox = groupId;
  cb.dataset.tab = tabName;
  cb.addEventListener("click", e => e.stopPropagation());
  cb.addEventListener("change", () => {
    const ids = layers.map(l => l.id);
    const turnOn = cb.checked;
    setLayersVisible(ids, turnOn);
  });

  const titleEl = document.createElement("span");
  titleEl.className = "group-title";
  titleEl.textContent = title;
  titleEl.addEventListener("click", e => {
    e.stopPropagation();
    zoomToLayers(layers.map(l => l.id));
  });

  header.appendChild(toggle);
  header.appendChild(cb);
  header.appendChild(titleEl);
  header.addEventListener("click", () => group.classList.toggle("open"));

  const body = document.createElement("div");
  body.className = "group-body";

  for (const layer of layers) {
    const row = document.createElement("label");
    row.className = "layer-row";

    const sw = document.createElement("span");
    sw.className = swatchClass(layer.featureType);
    sw.style.background = TYPE_COLORS[layer.featureType] || "#7f7f7f";

    const lcb = document.createElement("input");
    lcb.type = "checkbox";
    lcb.dataset.layerId = layer.id;
    lcb.dataset.tab = tabName;
    lcb.checked = !!layerState[layer.id];
    lcb.addEventListener("change", () => setLayerVisible(layer.id, lcb.checked));

    const lbl = document.createElement("span");
    lbl.textContent = tabName === "compound" ? layer.labelTab1 : layer.labelTab2;

    row.appendChild(lcb);
    row.appendChild(sw);
    row.appendChild(lbl);
    body.appendChild(row);
  }

  group.appendChild(header);
  group.appendChild(body);
  container.appendChild(group);
}

function buildSidebar() {
  panelCompound.innerHTML = "";
  panelPeriod.innerHTML = "";

  const sortedEntries = sortGroupsTab1(FILE_MANIFEST);
  const groupOrder = sortedEntries.map(groupLabel);

  for (const entry of sortedEntries) {
    const layers = sortLayersInGroup(ALL_LAYERS.filter(l => l.entry === entry));
    renderGroup(panelCompound, "c:" + groupLabel(entry), groupLabel(entry), layers, "compound");
  }

  const special = sortLayersTab2(ALL_LAYERS.filter(l => l.isBase), groupOrder);
  if (special.length) renderGroup(panelPeriod, "p:special", "Base Outlines", special, "period");

  const periodOrderTab2 = PERIOD_ORDER;
  for (const period of periodOrderTab2) {
    const layers = sortLayersTab2(ALL_LAYERS.filter(l => l.period === period && !l.isBase && !l.isInterpretation), groupOrder);
    if (layers.length) renderGroup(panelPeriod, "p:" + period, PERIOD_LABELS[period] || period, layers, "period");
  }

  syncAllCheckboxUI();
}

function getGroupState(ids) {
  const on = ids.filter(id => layerState[id]).length;
  if (on === 0) return "unchecked";
  if (on === ids.length) return "checked";
  return "indeterminate";
}

function syncAllCheckboxUI() {
  document.querySelectorAll("input[data-layer-id]").forEach(cb => {
    cb.checked = !!layerState[cb.dataset.layerId];
  });

  document.querySelectorAll(".group").forEach(group => {
    const ids = [...group.querySelectorAll("input[data-layer-id]")].map(cb => cb.dataset.layerId);
    const gcb = group.querySelector("input[data-group-checkbox]");
    if (!gcb || !ids.length) return;
    const st = getGroupState(ids);
    gcb.checked = st === "checked";
    gcb.indeterminate = st === "indeterminate";
  });
}

async function fetchLayer(id) {
  if (geoCache[id]) return geoCache[id];
  if (loading.has(id)) {
    while (loading.has(id)) await new Promise(r => setTimeout(r, 50));
    return geoCache[id];
  }
  loading.add(id);
  const layer = LAYER_BY_ID[id];
  try {
    const res = await fetch(encodePath(layer.id));
    if (!res.ok) throw new Error(res.statusText);
    const raw = await res.json();
    geoCache[id] = reprojectGeoJSON(raw);
    return geoCache[id];
  } finally {
    loading.delete(id);
  }
}

function popupHtml(props, layer) {
  const rows = [
    ["FeatName", props.FeatName], ["Type", props.Type], ["Period", props.Period],
    ["Note", props.Note], ["RelaFeat", props.RelaFeat], ["Source", layer.labelTab2]
  ];
  return "<div style='font-size:12px;min-width:140px'>" +
    rows.filter(([,v]) => v != null && v !== "").map(([k,v]) => "<div><b>" + k + ":</b> " + v + "</div>").join("") +
    "</div>";
}

function addToMap(id) {
  const layerMeta = LAYER_BY_ID[id];
  const gj = geoCache[id];
  if (!gj || leafletLayers[id]) return;

  const lg = L.geoJSON(gj, {
    style: () => styleForType(layerMeta.featureType, shouldAbandonLayer(layerMeta)),
    onEachFeature(feature, featureLayer) {
      featureLayer.bindPopup(popupHtml(feature.properties || {}, layerMeta));
      featureLayer.on("mouseover", function() {
        if (shouldAbandonLayer(layerMeta)) {
          this.setStyle({ weight: 2, fillOpacity: 0.3 });
        } else {
          this.setStyle({ weight: 4, fillOpacity: 0.55 });
        }
      });
      featureLayer.on("mouseout", function() {
        this.setStyle(styleForType(layerMeta.featureType, shouldAbandonLayer(layerMeta)));
      });
    }
  });
  lg.addTo(map);
  leafletLayers[id] = lg;

  const b = lg.getBounds();
  if (b.isValid()) {
    loadedBounds = loadedBounds ? loadedBounds.extend(b) : b;
  }
}

function removeFromMap(id) {
  if (leafletLayers[id]) {
    map.removeLayer(leafletLayers[id]);
    delete leafletLayers[id];
  }
}

async function setLayerVisible(id, visible) {
  layerState[id] = visible;
  if (visible) {
    setStatus("Loading " + id + "…");
    try {
      await fetchLayer(id);
      addToMap(id);
    } catch (e) {
      console.error(e);
      layerState[id] = false;
      setStatus("Failed to load: " + id);
      syncAllCheckboxUI();
      return;
    }
  } else {
    removeFromMap(id);
  }
  syncAllCheckboxUI();
  refreshAbandonmentStyles();
  const on = Object.values(layerState).filter(Boolean).length;
  setStatus(on + " layer(s) visible");
}

async function setLayersVisible(ids, visible) {
  setStatus(visible ? "Showing layers…" : "Hiding layers…");
  for (const id of ids) layerState[id] = visible;
  if (visible) {
    await Promise.all(ids.map(id => fetchLayer(id).catch(e => { console.error(id, e); layerState[id] = false; })));
    ids.forEach(id => { if (layerState[id] && geoCache[id]) addToMap(id); });
  } else {
    ids.forEach(removeFromMap);
  }
  syncAllCheckboxUI();
  refreshAbandonmentStyles();
  const on = Object.values(layerState).filter(Boolean).length;
  setStatus(on + " layer(s) visible");
}

function layersInActiveTab() {
  const panel = activeTab === "compound" ? panelCompound : panelPeriod;
  return [...panel.querySelectorAll("input[data-layer-id]")].map(cb => cb.dataset.layerId);
}

async function zoomToLayers(ids) {
  const visibleIds = ids.filter(id => layerState[id]);
  const toLoad = ids.filter(id => !geoCache[id]);
  if (toLoad.length) {
    setStatus("Loading for zoom…");
    await Promise.all(toLoad.map(id => fetchLayer(id).catch(() => null)));
    toLoad.forEach(id => { if (layerState[id]) addToMap(id); });
  }
  const bounds = L.latLngBounds([]);
  const target = visibleIds.length ? visibleIds : ids;
  for (const id of target) {
    if (!geoCache[id]) continue;
    if (!leafletLayers[id] && layerState[id]) addToMap(id);
    const lg = leafletLayers[id];
    if (lg) {
      const b = lg.getBounds();
      if (b.isValid()) bounds.extend(b);
    } else {
      const tmp = L.geoJSON(geoCache[id]);
      const b = tmp.getBounds();
      if (b.isValid()) bounds.extend(b);
    }
  }
  if (bounds.isValid()) map.fitBounds(bounds.pad(0.1));
}

function buildLegend() {

function buildMapLegend() {
  const body = document.getElementById("legend-body");
  const usedTypes = [...new Set(ALL_LAYERS.map(l => l.featureType))];
  const typeEntries = usedTypes.map(ft => ({
    ft,
    color: TYPE_COLORS[ft] || "#7f7f7f",
    label: TYPE_LABELS[ft] || ft
  }));
  if (!legendIncluded.size) typeEntries.forEach(e => legendIncluded.add(e.ft));

  const byColor = new Map();
  for (const { ft, color, label } of typeEntries) {
    if (!byColor.has(color)) byColor.set(color, { color, types: [], labels: [] });
    const g = byColor.get(color);
    g.types.push(ft);
    g.labels.push(label);
  }

  body.innerHTML = "";
  const colorEntries = [...byColor.values()].sort(
    (a, b) => colorLuminance(a.color) - colorLuminance(b.color) || a.labels[0].localeCompare(b.labels[0])
  );
  for (const { color, types, labels } of colorEntries) {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.dataset.featureTypes = types.join(",");
    if (!types.some(ft => legendIncluded.has(ft))) item.style.display = "none";
    const sw = document.createElement("span");
    sw.className = swatchClass(types[0]);
    sw.style.background = color;
    const lbl = document.createElement("span");
    lbl.textContent = [...new Set(labels)].join(" / ");
    item.appendChild(sw);
    item.appendChild(lbl);
    body.appendChild(item);
  }
}

function metersPerPixel(lat, zoom) {
  return 156543.03392 * Math.cos(lat * Math.PI / 180) / Math.pow(2, zoom);
}

function mapPointToMapWrap(x, y) {
  const mapEl = document.getElementById("map");
  const mapWrap = document.getElementById("map-wrap");
  const mapRect = mapEl.getBoundingClientRect();
  const wrapRect = mapWrap.getBoundingClientRect();
  return {
    x: x + (mapRect.left - wrapRect.left),
    y: y + (mapRect.top - wrapRect.top)
  };
}

function getScreenshotRectInMapWrap() {
  if (!screenshotLayer || !map) return null;
  const bounds = screenshotLayer.getBounds();
  const nw = map.latLngToContainerPoint(bounds.getNorthWest());
  const se = map.latLngToContainerPoint(bounds.getSouthEast());
  const left = Math.min(nw.x, se.x);
  const top = Math.min(nw.y, se.y);
  const width = Math.abs(se.x - nw.x);
  const height = Math.abs(se.y - nw.y);
  if (width < 1 || height < 1) return null;
  const tl = mapPointToMapWrap(left, top);
  return { left: tl.x, top: tl.y, width, height };
}

function screenToRelativePos(el, anchor) {
  const rect = getScreenshotRectInMapWrap();
  if (!rect) return null;
  const wrap = document.getElementById("map-wrap");
  const er = el.getBoundingClientRect();
  const wr = wrap.getBoundingClientRect();
  const left = er.left - wr.left;
  const top = er.top - wr.top;
  const ax = left;
  const ay = anchor === "bottom-left" ? top + el.offsetHeight : top;
  return {
    x: (ax - rect.left) / rect.width,
    y: (ay - rect.top) / rect.height
  };
}

function placeOverlayFromRelative(el, relPos, anchor) {
  const rect = getScreenshotRectInMapWrap();
  if (!rect || !relPos) return;
  const ax = rect.left + relPos.x * rect.width;
  const ay = rect.top + relPos.y * rect.height;
  if (anchor === "bottom-left") {
    el.style.left = ax + "px";
    el.style.top = (ay - el.offsetHeight) + "px";
  } else {
    el.style.left = ax + "px";
    el.style.top = ay + "px";
  }
  el.style.bottom = "auto";
  el.style.right = "auto";
}

function updateExportOverlaysPosition() {
  if (!screenshotLayer) return;
  const scaleBar = document.getElementById("scale-bar-wrap");
  const exportLegend = document.getElementById("export-legend-wrap");
  if (scaleBarVisible && scaleBarRelPos) {
    placeOverlayFromRelative(scaleBar, scaleBarRelPos, "bottom-left");
  }
  if (exportLegend.classList.contains("visible") && exportLegendRelPos) {
    placeOverlayFromRelative(exportLegend, exportLegendRelPos, "top-left");
  }
}

function initScreenshotRelativeDefaults() {
  if (!scaleBarRelPos) scaleBarRelPos = { x: 0.06, y: 0.94 };
  if (!exportLegendRelPos) exportLegendRelPos = { x: 0.06, y: 0.06 };
}

function snapScaleMeters(meters) {
  return Math.max(1, Math.round(meters));
}

function updateScaleBar() {
  const track = document.getElementById("scale-bar-track");
  if (!scaleBarVisible || !map) return;
  const mpp = metersPerPixel(map.getCenter().lat, map.getZoom());
  const totalM = snapScaleMeters(scaleBarWidthPx * mpp);
  const widthPx = totalM / mpp;
  track.style.width = widthPx + "px";
  track.innerHTML = "";

  const ticks = [{ m: 0, label: "0 m" }];
  if (totalM >= 6 && totalM % 2 === 0) {
    const half = totalM / 2;
    ticks.push({ m: half, label: half + " m" });
  }
  ticks.push({ m: totalM, label: totalM + " m" });

  for (const { m, label } of ticks) {
    const pct = totalM > 0 ? (m / totalM) * 100 : 0;
    const tick = document.createElement("div");
    tick.className = "scale-tick";
    tick.style.left = pct + "%";
    const lbl = document.createElement("div");
    lbl.className = "scale-tick-label";
    lbl.style.left = pct + "%";
    lbl.textContent = label;
    track.appendChild(tick);
    track.appendChild(lbl);
  }
}

function disableActiveDraw() {
  if (activeDrawHandler) {
    activeDrawHandler.disable();
    activeDrawHandler = null;
  }
  document.querySelectorAll("#map-sidebar-tools .icon-btn.active").forEach(b => b.classList.remove("active"));
}

  const btn = document.getElementById(btnId);

function initDrawing() {
  drawnItems = new L.FeatureGroup();
  exportItems = new L.FeatureGroup();
  map.addLayer(drawnItems);
  map.addLayer(exportItems);

  map.on(L.Draw.Event.CREATED, e => {
    disableActiveDraw();
    if (e.layerType === "rectangle" && drawingScreenshotArea) {
      drawingScreenshotArea = false;
      if (screenshotLayer) exportItems.removeLayer(screenshotLayer);
      screenshotLayer = e.layer;
      exportItems.addLayer(e.layer);
      initScreenshotRelativeDefaults();
      updateExportOverlaysPosition();
      setStatus("Screenshot area defined. Use Download to export.");
      return;
    }
    drawnItems.addLayer(e.layer);
    setStatus("Sketch added.");
  });

  map.on(L.Draw.Event.DRAWSTOP, () => disableActiveDraw());
  map.on(L.Draw.Event.EDITSTOP, () => {
    if (editToolbar) { editToolbar.disable(); editToolbar = null; }
    disableActiveDraw();
    setStatus("Sketch updated.");
  });
  map.on(L.Draw.Event.DELETESTOP, () => {
    disableActiveDraw();
    setStatus("Sketch deleted.");
  });
  map.on("zoom move zoomend moveend", () => {
    updateScaleBar();
    updateExportOverlaysPosition();
  });
}

function startDrawLine() {
  disableActiveDraw();
  if (editToolbar) { editToolbar.disable(); editToolbar = null; }
  activeDrawHandler = new L.Draw.Polyline(map, { shapeOptions: { color: "#c0392b", weight: 3 } });
  activeDrawHandler.enable();
  setActiveTool("tool-draw-line");
}

function startDrawPolygon() {
  disableActiveDraw();
  if (editToolbar) { editToolbar.disable(); editToolbar = null; }
  activeDrawHandler = new L.Draw.Polygon(map, { shapeOptions: { color: "#c0392b", weight: 2, fillOpacity: 0.15 } });
  activeDrawHandler.enable();
  setActiveTool("tool-draw-polygon");
}

function startScreenshotArea() {
  disableActiveDraw();
  if (editToolbar) { editToolbar.disable(); editToolbar = null; }
  drawingScreenshotArea = true;
  activeDrawHandler = new L.Draw.Rectangle(map, {
    shapeOptions: { color: "#3388ff", weight: 2, fillOpacity: 0, fill: false, opacity: 1, dashArray: "6 4" }
  });
  activeDrawHandler.enable();
  setActiveTool("tool-screenshot-area");
}

function startEditSketch() {
  disableActiveDraw();
  editToolbar = new L.EditToolbar.Edit(map, { featureGroup: drawnItems });
  editToolbar.enable();
  setActiveTool("tool-edit-sketch");
}

function startDeleteSketch() {
  disableActiveDraw();
  if (editToolbar) { editToolbar.disable(); editToolbar = null; }
  const del = new L.EditToolbar.Delete(map, { featureGroup: drawnItems });
  del.enable();
  setActiveTool("tool-delete-sketch");
}

function toggleScaleBar() {
  if (!screenshotLayer) {
    setStatus("Draw a screenshot area first.");
    return;
  }
  scaleBarVisible = !scaleBarVisible;
  const wrap = document.getElementById("scale-bar-wrap");
  wrap.classList.toggle("visible", scaleBarVisible);
  if (scaleBarVisible) {
    if (!scaleBarRelPos) scaleBarRelPos = { x: 0.06, y: 0.94 };
    updateScaleBar();
    updateExportOverlaysPosition();
  }
  document.getElementById("tool-scale-bar").classList.toggle("active", scaleBarVisible);
}

function makeDraggableScreenshotOverlay(el, anchor, setRelPos) {
  let dragging = false, startX, startY, origLeft, origTop;
  el.addEventListener("mousedown", e => {
    if (e.target.closest(".overlay-resize-handle")) return;
    dragging = true;
    el.classList.add("dragging");
    const rect = el.getBoundingClientRect();
    const parent = el.offsetParent.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    origLeft = rect.left - parent.left;
    origTop = rect.top - parent.top;
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const left = origLeft + (e.clientX - startX);
    const top = origTop + (e.clientY - startY);
    el.style.left = Math.max(0, left) + "px";
    el.style.top = Math.max(0, top) + "px";
    el.style.bottom = "auto";
    el.style.right = "auto";
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    el.classList.remove("dragging");
    const rel = screenToRelativePos(el, anchor);
    if (rel) setRelPos(rel);
  });
}

function makeDraggable(el, handleEl) {
  const handle = handleEl || el;
  let dragging = false, startX, startY, origLeft, origTop;
  handle.addEventListener("mousedown", e => {
    if (e.target.closest("input") || e.target.closest(".overlay-resize-handle")) return;
    dragging = true;
    el.classList.add("dragging");
    const rect = el.getBoundingClientRect();
    const parent = el.offsetParent.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    origLeft = rect.left - parent.left;
    origTop = rect.top - parent.top;
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const left = origLeft + (e.clientX - startX);
    const top = origTop + (e.clientY - startY);
    el.style.left = Math.max(0, left) + "px";
    el.style.top = Math.max(0, top) + "px";
    el.style.bottom = "auto";
    el.style.right = "auto";
  });
  window.addEventListener("mouseup", () => {
    dragging = false;
    el.classList.remove("dragging");
  });
}

function applyExportLegendDisplayScale() {
  const wrap = document.getElementById("export-legend-wrap");
  wrap.style.transform = "scale(" + exportLegendUserScale + ")";
}

function makeScaleBarResizable(wrapEl, getWidth, setWidth, onResize) {
  const handle = wrapEl.querySelector(".overlay-resize-handle");
  if (!handle) return;
  handle.addEventListener("mousedown", e => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startWidth = getWidth();
    const onMove = ev => {
      setWidth(Math.max(40, Math.min(500, startWidth + (ev.clientX - startX))));
      onResize();
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  });
}

function makeResizable(el, getScale, setScale, applyScale) {
  const handle = el.querySelector(".overlay-resize-handle");
  if (!handle) return;
  handle.addEventListener("mousedown", e => {
    e.preventDefault();
    e.stopPropagation();
    const startX = e.clientX;
    const startY = e.clientY;
    const startScale = getScale();
    const onMove = ev => {
      const delta = (ev.clientX - startX + ev.clientY - startY) / 2;
      setScale(Math.max(0.4, Math.min(3, startScale + delta * 0.008)));
      applyScale();
    };
    const onUp = () => {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  });
}

function screenshotCaptureRect(bounds) {
  const nw = map.latLngToContainerPoint(bounds.getNorthWest());
  const se = map.latLngToContainerPoint(bounds.getSouthEast());
  const left = Math.min(nw.x, se.x);
  const top = Math.min(nw.y, se.y);
  const width = Math.abs(se.x - nw.x);
  const height = Math.abs(se.y - nw.y);
  const tl = mapPointToMapWrap(left, top);
  return { x: tl.x, y: tl.y, w: width, h: height };
}

async function waitForMapSettled() {
  await new Promise(resolve => {
    map.once("moveend", () => setTimeout(resolve, 200));
    setTimeout(resolve, 1500);
  });
  const tileLayers = [osmLayer, blankLayer].filter(layer => layer && map.hasLayer(layer));
  await Promise.all(tileLayers.map(layer => new Promise(resolve => {
    if (layer._loading) layer.once("load", () => setTimeout(resolve, 100));
    else setTimeout(resolve, 100);
  })));
}

async function downloadScreenshot() {
  if (!screenshotLayer) {
    setStatus("Draw a screenshot area first.");
    return;
  }
  setStatus("Generating image…");
  const bounds = screenshotLayer.getBounds();
  const savedView = { center: map.getCenter(), zoom: map.getZoom() };

  map.fitBounds(bounds, { animate: false, padding: [0, 0] });
  updateScaleBar();
  updateExportOverlaysPosition();
  await waitForMapSettled();

  let { x, y, w, h } = screenshotCaptureRect(bounds);
  if (w < 10 || h < 10) {
    map.setView(savedView.center, savedView.zoom, { animate: false });
    updateScaleBar();
    updateExportOverlaysPosition();
    setStatus("Screenshot area too small.");
    return;
  }

  const exportScale = Math.max(
    EXPORT_SCALE,
    EXPORT_MIN_WIDTH_PX / w,
    EXPORT_MIN_HEIGHT_PX / h
  );
  const mapWrap = document.getElementById("map-wrap");
  const mapLegend = document.getElementById("legend");
  const resizeHandles = [...document.querySelectorAll(".overlay-resize-handle")];
  exportItems.removeLayer(screenshotLayer);
  mapLegend.style.visibility = "hidden";
  resizeHandles.forEach(handle => { handle.style.visibility = "hidden"; });
  try {
    const canvas = await html2canvas(mapWrap, {
      useCORS: true, allowTaint: true, backgroundColor: "#ffffff",
      x, y, width: w, height: h, scale: exportScale, logging: false
    });
    const link = document.createElement("a");
    link.download = "beixujiaqiao-map.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
    setStatus(`Image downloaded (${canvas.width} × ${canvas.height} px).`);
  } catch (e) {
    console.error(e);
    setStatus("Download failed: " + e.message);
  } finally {
    exportItems.addLayer(screenshotLayer);
    screenshotLayer.setStyle({
      color: "#3388ff", weight: 2, fillOpacity: 0, fill: false, opacity: 1, dashArray: "6 4"
    });
    mapLegend.style.visibility = "";
    resizeHandles.forEach(handle => { handle.style.visibility = ""; });
    map.setView(savedView.center, savedView.zoom, { animate: false });
    updateScaleBar();
    updateExportOverlaysPosition();
  }
}

async function loadInitialLayers(ids) {
  const batchSize = 12;
  for (let i = 0; i < ids.length; i += batchSize) {
    const batch = ids.slice(i, i + batchSize);
    await Promise.all(batch.map(id => fetchLayer(id).catch(e => {
      console.error(id, e);
      layerState[id] = false;
    })));
    batch.forEach(id => { if (layerState[id] && geoCache[id]) addToMap(id); });
    setStatus("Loading layers… " + Math.min(i + batchSize, ids.length) + " / " + ids.length);
  }
  syncAllCheckboxUI();
  refreshAbandonmentStyles();
}

function boundsFromLayerIds(ids) {
  const bounds = L.latLngBounds([]);
  for (const id of ids) {
    if (!geoCache[id]) continue;
    const lg = leafletLayers[id];
    if (lg) {
      const b = lg.getBounds();
      if (b.isValid()) bounds.extend(b);
    } else {
      const tmp = L.geoJSON(geoCache[id]);
      const b = tmp.getBounds();
      if (b.isValid()) bounds.extend(b);
    }
  }
  return bounds;
}

async function fitSelectedLayers() {
  const ids = ALL_LAYERS.filter(l => layerState[l.id]).map(l => l.id);
  if (!ids.length) {
    setStatus("No layers selected.");
    return;
  }
  await zoomToLayers(ids);
}

function createBlankLayer() {
  const layer = L.gridLayer({
    minZoom: 0,
    maxZoom: 22,
    tileSize: 256,
    updateWhenZooming: true,
    updateWhenIdle: true,
    keepBuffer: 4,
    attribution: ""
  });
  layer.createTile = function () {
    const tile = document.createElement("div");
    tile.style.width = "256px";
    tile.style.height = "256px";
    tile.style.background = "#ffffff";
    tile.style.pointerEvents = "none";
    return tile;
  };
  return layer;
}

function setBasemap(mode) {
  const tip = document.getElementById("toggle-basemap-tip");
  const btn = document.getElementById("toggle-basemap");
  if (mode === "blank") {
    if (map.hasLayer(osmLayer)) map.removeLayer(osmLayer);
    if (!map.hasLayer(blankLayer)) blankLayer.addTo(map);
    blankLayer.bringToBack();
    activeBasemap = "blank";
    if (tip) tip.textContent = btn.dataset.tipOsm || "OSM basemap";
    btn.classList.add("active");
  } else {
    if (map.hasLayer(blankLayer)) map.removeLayer(blankLayer);
    if (!map.hasLayer(osmLayer)) osmLayer.addTo(map);
    osmLayer.bringToBack();
    activeBasemap = "osm";
    if (tip) tip.textContent = btn.dataset.tipBlank || "Blank background";
    btn.classList.remove("active");
  }
}

function initMap() {
  map = L.map("map", {
    preferCanvas: true,
    zoomControl: false,
    zoomSnap: 0,
    zoomDelta: 0.25,
    wheelPxPerZoomLevel: 60
  }).setView(defaultViewBounds().getCenter(), 16);
  osmLayer = L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    minZoom: 0, maxZoom: 22, attribution: "&copy; OpenStreetMap"
  }).addTo(map);
  blankLayer = createBlankLayer();
}

async function init() {
  initMap();
  initDrawing();
  buildSidebar();
  buildLegend();

  const selectedIds = ALL_LAYERS.filter(l => layerState[l.id]).map(l => l.id);
  await loadInitialLayers(selectedIds);
  map.invalidateSize();
  map.fitBounds(defaultViewBounds());
  const on = Object.values(layerState).filter(Boolean).length;
  setStatus(on + " layer(s) visible");

  makeDraggable(document.getElementById("legend"), document.getElementById("legend-drag-handle"));
  makeDraggableScreenshotOverlay(
    document.getElementById("scale-bar-wrap"),
    "bottom-left",
    rel => { scaleBarRelPos = rel; }
  );
  makeDraggableScreenshotOverlay(
    document.getElementById("export-legend-wrap"),
    "top-left",
    rel => { exportLegendRelPos = rel; }
  );
  makeScaleBarResizable(
    document.getElementById("scale-bar-wrap"),
    () => scaleBarWidthPx,
    v => { scaleBarWidthPx = v; },
    updateScaleBar
  );
  makeResizable(
    document.getElementById("export-legend-wrap"),
    () => exportLegendUserScale,
    v => { exportLegendUserScale = v; },
    applyExportLegendDisplayScale
  );

  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b === btn));
      panelCompound.classList.toggle("active", activeTab === "compound");
      panelPeriod.classList.toggle("active", activeTab === "period");
      syncAllCheckboxUI();
    });
  });

  document.getElementById("show-all-global").addEventListener("click", () => setLayersVisible(ALL_LAYERS.map(l => l.id), true));
  document.getElementById("hide-all-global").addEventListener("click", () => setLayersVisible(ALL_LAYERS.map(l => l.id), false));
  document.getElementById("collapse-all").addEventListener("click", () => {
    const panel = activeTab === "compound" ? panelCompound : panelPeriod;
    panel.querySelectorAll(".group").forEach(g => g.classList.remove("open"));
  });
  document.getElementById("abandonment-mode").addEventListener("change", e => {
    abandonmentMode = e.target.checked;
    refreshAbandonmentStyles();
  });
  document.getElementById("clear-sketches").addEventListener("click", () => {
    drawnItems.clearLayers();
    disableActiveDraw();
    if (editToolbar) { editToolbar.disable(); editToolbar = null; }
    setStatus("Sketches cleared.");
  });
  document.getElementById("fit-all").addEventListener("click", () => fitSelectedLayers());
  document.getElementById("tool-zoom-in").addEventListener("click", () => map.zoomIn());
  document.getElementById("tool-zoom-out").addEventListener("click", () => map.zoomOut());
  document.getElementById("tool-draw-line").addEventListener("click", () => startDrawLine());
  document.getElementById("tool-draw-polygon").addEventListener("click", () => startDrawPolygon());
  document.getElementById("tool-edit-sketch").addEventListener("click", () => startEditSketch());
  document.getElementById("tool-delete-sketch").addEventListener("click", () => startDeleteSketch());
  document.getElementById("tool-screenshot-area").addEventListener("click", () => startScreenshotArea());
  document.getElementById("tool-scale-bar").addEventListener("click", () => toggleScaleBar());
  document.getElementById("tool-legend-config").addEventListener("click", () => {
    if (!screenshotLayer) {
      setStatus("Draw a screenshot area first.");
      return;
    }
    document.getElementById("legend-config").classList.toggle("open");
    document.getElementById("tool-legend-config").classList.toggle("active",
      document.getElementById("legend-config").classList.contains("open"));
  });
  document.getElementById("tool-download").addEventListener("click", () => downloadScreenshot());
  document.getElementById("toggle-basemap").addEventListener("click", function() {
    setBasemap(activeBasemap === "osm" ? "blank" : "osm");
  });
  document.getElementById("legend-chevron").addEventListener("click", () => {
    document.getElementById("legend").classList.toggle("collapsed");
    document.getElementById("legend-chevron").textContent =
      document.getElementById("legend").classList.contains("collapsed") ? "▶" : "▼";
  });
  document.getElementById("sidebar-toggle").addEventListener("click", () => {
    document.getElementById("sidebar").classList.toggle("collapsed");
  });
}

init().catch(e => { console.error(e); setStatus("Init failed: " + e.message); });
</script>
